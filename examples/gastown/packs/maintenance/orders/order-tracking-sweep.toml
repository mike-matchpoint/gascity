# Closes stale order tracking beads left behind by crashed or resource-starved
# exec dispatches, and conservatively closes abandoned formula-order wisp
# subtrees for configured non-manual formula orders. Fresh tracking beads and
# fresh formula work are left alone so in-flight orders keep their normal
# single-flight protection.
[order]
description = "Close stale order-tracking beads so blocked orders can retry"
trigger = "cooldown"
interval = "1m"
exec = "gc order sweep-tracking --stale-after 10m --include-configured-wisps --wisp-stale-after 24h --quiet"
