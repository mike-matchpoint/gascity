# Scan each registered rig's specs/agent-work-orders/ every 60s and
# sling the spec-cartographer formula for any work order that has
# neither beads sourced from it nor an in-flight planning run.
#
# Enumeration and idempotency are 100% mechanical — `gc rig list`,
# `bd list --label`, `bd list --status=open --type=molecule`. No LLM
# judgment needed. The controller runs this directly via exec instead
# of burning agent context (matches `gate-sweep`, `orphan-sweep`,
# `wisp-compact`, `mol-dog-reaper`, and the other codegen-support
# watchers).
#
# Frequent firing is safe because the script's in-flight check
# short-circuits the inner loop when cartographer is busy in a rig —
# most ticks during a run do one cheap `bd list` and exit.
[order]
description = "Auto-sling spec-cartographer for new work orders in any rig"
exec = "bash $PACK_DIR/assets/scripts/spec-cartographer-watch.sh"
trigger = "cooldown"
interval = "60s"
timeout = "10m"
