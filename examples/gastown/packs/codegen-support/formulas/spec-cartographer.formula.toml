```

`routing_target` is the resolved `$SLING_TARGET`; bake it in for
operator traceability. `key_to_id_map` is the full mapping returned by
`bd create --graph`. Every entry of `beads_emitted` has its
`gc.routed_to` metadata pointing here (set atomically at create time
inside the `bd create --graph` transaction), and also carries the
plan-side `key`, `type`, `parent_key`/`parent_id` fields and any
`hold_labels` so `validate-store` can prove parent materialization and
HOLDING dependency materialization from stable evidence.

`edges_added` counts come from the JSON arrays in `graph.json:edges.*`
plus the HOLDING-derived edge counts, MINUS any entries listed in
`pre_flight_drops`.

`pre_flight_drops` mirrors the entries written to
`$RUN_DIR/reverse_edge_failures.jsonl` during step 2's pre-flight
check. The category tells the mayor which edge class was affected
(forward edges that closed are equally bad — the new bead is still
created but loses a dep).

`batch_close_failure` is the contents of `$RUN_DIR/emit_batch_failure.json`
if step 6 failed (HOLDINGs didn't close — soft failure, requires
operator to close them manually via `bd close <id> --reason "..."`).
Null if step 6 succeeded or was empty.

Immediately after writing `emitted.json`, and BEFORE mailing the
mayor or closing this step, prove the emission-time routing contract
from a fresh bead-store query. This check runs before normal
automation has time to move `gc.routed_to` from polecat to refinery;
later `validate-store` checks lifecycle progression instead of
requiring the mutable route field to remain at its initial value.

```bash
gc --rig "$RIG" bd list --all \\
  --label="source:work-order:${WORK_ORDER_ID}" \\
  --label="epoch:${EPOCH}" --json \\
  > "$RUN_DIR/emission_query.json"

CARTOGRAPHER_ROUTING_MODE=emission \\
CARTOGRAPHER_ROUTING_QUERY="$RUN_DIR/emission_query.json" \\
CARTOGRAPHER_ROUTING_OUTPUT="$RUN_DIR/emission_routing_validation.json" \\
  .gc/scripts/cartographer-validate-emitted-routing.sh || {
    gc mail send gastown.mayor \\
      -s "[HUMAN REVIEW NEEDED] cartographer emit routing validation failed for $WORK_ORDER_ID" \\
      -m "bd create --graph landed, but at least one emitted task bead was not immediately routed to $(jq -r '.routing_target' "$RUN_DIR/emitted.json"). See $RUN_DIR/emission_routing_validation.json and $RUN_DIR/emitted.json. Step bead $GC_BEAD_ID blocked for human review."
    .gc/scripts/cartographer-human-review-block.sh "emit routing validation failed"
    gc runtime drain-ack
    exit 0
  }

TMP_EMITTED=$(mktemp)
jq --slurpfile routing "$RUN_DIR/emission_routing_validation.json" \\
   '. + {routing_verification_at_emit: $routing[0]}' \\
   "$RUN_DIR/emitted.json" > "$TMP_EMITTED" \\
  && mv "$TMP_EMITTED" "$RUN_DIR/emitted.json"
```

**9. Mail the mayor.** This is the wake signal — new ready beads
have landed in the rig store and the obsolete review list (if any)
needs the mayor's priority call.

```bash
SUMMARY_MSG=$(cat <<EOF
Cartographer epoch ${EPOCH} for work order ${WORK_ORDER_ID}
landed in rig ${RIG}.

NEW BEADS READY FOR DISPATCH
- Convoys created: $(jq -r '.convoys_created | length' "$RUN_DIR/emitted.json")
- Convoys joined (cohort continuity): $(jq -r '.convoys_joined | length' "$RUN_DIR/emitted.json")
- Task beads emitted: $(jq -r '.beads_emitted | length' "$RUN_DIR/emitted.json")
- Skipped (already represented): $(jq -r '.beads_skipped_existing | length' "$RUN_DIR/emitted.json")

EDGES ADDED
- new_to_new:       $(jq -r '.edges_added.new_to_new // 0' "$RUN_DIR/emitted.json")
- new_to_existing:  $(jq -r '.edges_added.new_to_existing // 0' "$RUN_DIR/emitted.json")
- new_to_cross_wo:  $(jq -r '.edges_added.new_to_cross_wo // 0' "$RUN_DIR/emitted.json")
- existing_to_new:  $(jq -r '.edges_added.existing_to_new // 0' "$RUN_DIR/emitted.json")

$(PFD=$(jq -r '.pre_flight_drops // [] | length' "$RUN_DIR/emitted.json")
if [ "$PFD" -gt 0 ]; then
  echo "PRE-FLIGHT EDGE DROPS (${PFD}) — existing-bead targets closed between graph and emit:"
  jq -r '.pre_flight_drops[]? | "  - [\\(.category)] \\(.from // .to_id) → \\(.to_key // .from_key // ""): \\(.reason)"' "$RUN_DIR/emitted.json"
  echo
  echo "Each drop is an edge the graph step planned but couldn't apply"
  echo "because the existing bead it referenced is no longer open. The"
  echo "cartographer omitted those edges from the bd create --graph plan"
  echo "rather than abort. Operator may want to: (a) verify the dep claim"
  echo "is still accurate now, (b) if yes apply via gc bd dep add <from>"
  echo "<to>, (c) if the target closing means the dep is satisfied, no"
  echo "action needed."
fi)

$(BCF=$(jq -r '.batch_close_failure // null' "$RUN_DIR/emitted.json")
if [ "$BCF" != "null" ] && [ -n "$BCF" ]; then
  echo "BATCH CLOSE FAILURE — HOLDINGs did NOT close:"
  echo "$BCF" | jq -r '. | "  stderr: \\(.stderr)"'
  echo
  echo "The bd create --graph transaction in step 4 succeeded — all new"
  echo "beads + retarget edges landed. The bd batch transaction in step 6"
  echo "rolled back. The HOLDINGs that should have closed are still open,"
  echo "but their dependents now have BOTH old (-> HOLDING) and new"
  echo "(-> real bead) deps — over-blocked, not under-blocked. Operator"
  echo "may close the HOLDINGs manually via:"
  echo "    gc --rig $RIG bd close <id> --reason '${WORK_ORDER_ID} landed (cartographer epoch ${EPOCH})'"
fi)

REVERSE EDGES (existing_to_new) — for context:

The cartographer added depends_on edges from existing open beads TO
new beads emitted in this run, where the existing bead's done_when
is genuinely blocked by what a new bead creates. This is the
mechanism that keeps the rig's dependency graph accurate when new
runs produce upstream prerequisites for already-planned work.
Convoy membership does not affect this — reverse edges cross convoy
boundaries when the dependency does. See graph.json:edges.existing_to_new
for the reason text on each.

STRANDED COHORT MEMBERS ($(jq -r '.stranded_cohort_members | length' "$RUN_DIR/beads_inventory.json"))

If non-zero: other WOs in this work order's land-together set have
existing beads in per-WO convoys that pre-date the cohort convoy.
The cartographer did NOT move them — manual migration is the only
safe path. Each entry below shows a WO that may want its beads
migrated into the cohort convoy:

$(jq -r '.stranded_cohort_members[] | "  - \\(.wo_id): convoy \\(.convoy_bead_id) (\\(.task_bead_ids | length) task beads)"' "$RUN_DIR/beads_inventory.json")

OBSOLETE-REVIEW CANDIDATES ($(jq -r '.obsolete_review | length' "$RUN_DIR/reconcile.json"))

Prior-epoch open beads that may no longer be needed after this
re-plan. The cartographer did NOT close them — that is your
priority call. Each entry has a reason and a recommendation.

See: $RUN_DIR/reconcile.json (key: obsolete_review)

Per-bead reasons:
$(jq -r '.obsolete_review[] | "  - \\(.bead_id): \\(.reason) [recommend: \\(.recommendation)]"' "$RUN_DIR/reconcile.json")

HOLDING STUBS CREATED ($(jq -r '.holding_stubs_created | length' "$RUN_DIR/emitted.json"))

For unplanned cross-WO blockers (work orders this run depends on
that have no beads in the rig yet), the cartographer created a
HOLDING stub per blocker WO. Affected new beads carry a
`hold:<blocker-wo>` label — dogs read this label across the rig to
prioritize which work orders to plan next. No operator action is
required; this is informational.

$(jq -r '.holding_stubs_created[]? | "  - \\(.id): blocker=\\(.blocker_wo_id), dependents=\\(.dependent_bead_count)"' "$RUN_DIR/emitted.json")

HOLDING STUBS RELEASED ($(jq -r '.holding_stubs_released | length' "$RUN_DIR/emitted.json"))

Prior cartographer runs created HOLDING stubs naming ${WORK_ORDER_ID}
as their blocker. This run lands the real beads, so those HOLDINGs'
dependents have been retargeted to specific new beads via category-d
edges and the HOLDINGs themselves have been closed. The original
HOLDING dep edges remain on the dependents but point at closed beads
(no-op). Routing is sticky, so the controller's scale_check picks up
newly-unblocked dependents on its next tick — no re-sling needed.

$(jq -r '.holding_stubs_released[]? | "  - \\(.id): was placeholder-for-wo \\(.placeholder_for_wo), \\(.retarget_edges) retarget edge(s)"' "$RUN_DIR/emitted.json")

PARTIAL HOLDING RELEASE ($(jq -r '.holding_stubs_partial | length' "$RUN_DIR/emitted.json"))

These prior HOLDINGs target ${WORK_ORDER_ID} but at least one of
their dependents could not be cleanly retargeted to a specific new
bead in this run (no named-artifact match). The HOLDING was LEFT
OPEN. Operator action recommended:

1. Inspect each unretargetable dependent's `done_when` and decide
   whether one of this run's new beads is the real prerequisite
   anyway (the cartographer's bar is strict; you may have more
   context).
2. If yes: `gc --rig "$RIG" bd dep add <dependent> <new-bead>`,
   then `gc --rig "$RIG" bd close <holding-id> --reason "..."`.
3. If no: leave the HOLDING open; dependents stay blocked until
   the next plan run produces a real prereq.

$(jq -r '.holding_stubs_partial[]? | "  - \\(.id): placeholder-for-wo \\(.placeholder_for_wo). Unretargetable: \\(.unretargetable_dependents | join(\", \")). Reason: \\(.reason)"' "$RUN_DIR/emitted.json")

ROUTING

All emitted task beads carry `metadata.gc.routed_to` =
$(jq -r '.routing_target // "?"' "$RUN_DIR/emitted.json"). The
controller's scale_check picks them up on its next tick.

UNRESOLVED BLOCKER REFS ($(jq -r '.unresolved_blocker_refs | length' "$RUN_DIR/beads_inventory.json"))

These `Blocked by:` annotations from ${WORK_ORDER_ID}'s work order file
could not be matched to any file under specs/agent-work-orders/. The
cartographer treated them as soft warnings and emitted no cross-WO
edges for them. Investigate each ref — either fix the work order's
annotation, or, if the referenced WO genuinely exists under a different
filename, manually create a HOLDING stub for it (add a node to a new
`bd create --graph` plan with the placeholder labels documented in
step 3b).

Unresolved refs:
$(jq -r '.unresolved_blocker_refs[]? | "  - " + .' "$RUN_DIR/beads_inventory.json")

Artifacts for this run: $RUN_DIR/
EOF
)

gc mail send gastown.mayor \\
  -s "CARTOGRAPHER: ${WORK_ORDER_ID} epoch ${EPOCH} landed (${RIG})" \\
  -m "$SUMMARY_MSG"
```

If the run had zero `obsolete_review` entries, the mail still goes
out — the mayor needs to know new beads are ready for dispatch. The
`bd hook` machinery will surface ready beads regardless, but the
mail is the explicit, durable record of this run.

**Failure modes:**

- **`bd create --graph` (step 4) failure** — the whole transaction
  rolled back; NO beads created. Step 4 already writes
  `$RUN_DIR/failure.json`, mails the mayor with `[HUMAN REVIEW
  NEEDED]`, blocks the step for human review, and exits after
  `gc runtime drain-ack`. Operator inspects `emit_plan.json` +
  `emit_create.stderr`, fixes the plan, and explicitly resumes the
  step with `.gc/scripts/cartographer-human-review-resume.sh`.
- **`bd batch` (step 6) failure** — the create transaction
  succeeded; the HOLDING-close transaction rolled back. New beads
  are real with all edges wired and routing. HOLDINGs that should
  have closed are still open; dependents are over-blocked but not
  under-blocked (safe). Recorded in `emitted.json:batch_close_failure`
  and surfaced in mayor mail; operator can manually close the
  HOLDINGs. Step bead still closes — emit's primary contract
  (atomic creation + routing) succeeded.
- **Pre-flight drops (step 2)** — edges to existing beads whose
  status changed since the graph step are silently dropped from
  the plan and logged to `pre_flight_drops`. Not a fatal failure;
  the affected edges (and any HOLDINGs whose retargets got dropped)
  are surfaced in mayor mail.
**Mark this step complete.**

```bash
gc --rig "$RIG" bd close "$GC_BEAD_ID" --continue
gc runtime drain-ack
```

This explicit close and drain acknowledgement are REQUIRED. gascity's formula engine does not
auto-close step beads when a fresh-wake session exits; omitting the close
leaves the step bead open and deadlocks downstream steps that `needs`
this one. The `--continue` flag advances the molecule to the next
eligible step. The `gc runtime drain-ack` call lets the controller archive
this fresh session so the singleton Cartographer pool can spawn a new
session for the next ready step.

If you took a failure-mode branch above and exited early (wrote
`failure.json` or `needs_human.json` and stopped), do NOT close and do
NOT leave the step assigned to cartographer. Run the human-review step
disposition helper from the formula description so automation stops
dispatching this failed step until an operator explicitly resumes it.

"""

[[steps]]
id = "validate-store"
title = "Validate the emitted bead store (post-mutation invariants)"
needs = ["emit"]
description = """
Read back every bead just emitted and verify the invariants that
require querying the live bead store. Plan-level invariants (a, c,
d, e, f, g, h, l) were already enforced pre-emit by `validate-plan`
and won't be re-checked here — if you suspect they regressed, see
`$RUN_DIR/validation_plan.json` and `graph.json`.

On any failure, leave the emitted beads in place, mail the mayor
with subject prefix `[HUMAN REVIEW NEEDED]` (see "Human-review
notifications" in the formula description), and write
`$RUN_DIR/validation_store.json` with `status=failed`.

**1. Load state and emit summary:**
```bash
WO_PATH_INPUT="{{work_order_path}}" . .gc/scripts/cartographer-load-state.sh
cat "$RUN_DIR/emitted.json"
```

**2. Re-query the emitted set.** Pass `--all` so the validation
covers everything we created (including any beads marked as not-open
at creation time — rare, but possible if the runtime sets a non-open
status by default for some bead types):

```bash
gc --rig "$RIG" bd list --all \\
  --label="source:work-order:${WORK_ORDER_ID}" \\
  --label="epoch:${EPOCH}" --json \\
  > "$RUN_DIR/validation_query.json"
```

**3. Run every check below. ALL must pass.**

a. **Convoy-membership linkage materialized.** For each task bead
   in `emit_plan.json` whose draft referenced a convoy via
   `parent_key` or `parent_id`, the emitted bead MUST
   carry the equivalent parent linkage in the bead store. Resolve
   `parent_key` to the just-emitted convoy bead id via
   `emitted.json:key_to_id_map` (or equivalent), then accept either
   `parent == <convoy id>`, `parent_id == <convoy id>`, or a
   `dependencies[]` row with `type == "parent-child"` and
   `depends_on_id == <convoy id>`.

   ```bash
   jq -c '
     .nodes[]?
     | select((.type // .issue_type) == "task")
     | select(((.labels // []) | index("placeholder:cross-wo-blocker")) | not)
     | select(.parent_key? or .parent_id?)
   ' "$RUN_DIR/emit_plan.json" > "$RUN_DIR/_planned_parented_tasks.jsonl"

   while IFS= read -r NODE; do
     [ -z "$NODE" ] && continue
     TASK_KEY=$(jq -r '.key' <<<"$NODE")
     TASK_ID=$(jq -r --arg k "$TASK_KEY" '.key_to_id_map[$k] // empty' "$RUN_DIR/emitted.json")
     PLAN_PARENT=$(jq -r '.parent_key // .parent_id // empty' <<<"$NODE")
     [ -z "$PLAN_PARENT" ] && continue   # standalone task — no parent expected
     EXPECTED_CONVOY_ID=$(jq -r --arg pk "$PLAN_PARENT" '.key_to_id_map[$pk] // $pk' "$RUN_DIR/emitted.json")
     ACTUAL_PARENT=$(jq -r --arg id "$TASK_ID" '.[] | select(.id==$id) | .parent // .parent_id // ""' "$RUN_DIR/validation_query.json")
     HAS_PARENT_CHILD=$(jq -r --arg id "$TASK_ID" --arg parent "$EXPECTED_CONVOY_ID" '
       [.[] | select(.id==$id)
        | .dependencies[]?
        | select(.type == "parent-child" and .depends_on_id == $parent)]
       | length
     ' "$RUN_DIR/validation_query.json")
     [ "$ACTUAL_PARENT" = "$EXPECTED_CONVOY_ID" ] || [ "$HAS_PARENT_CHILD" != "0" ] || echo "FAIL: $TASK_ID expected parent/parent-child=$EXPECTED_CONVOY_ID got parent='$ACTUAL_PARENT'"
   done < "$RUN_DIR/_planned_parented_tasks.jsonl"
   ```

   Any FAIL output → fail the step.

   Rationale: convoy membership is structural, not label-based. The
   current `bd list --json` surface exposes the computed parent as
   `parent` and retains the underlying `parent-child` dependency row;
   older or wrapper surfaces may expose `parent_id`. The pre-emit
   `validate-plan` step already checks the plan-level invariant; this
   post-emit re-check catches any failure where `bd create --graph`
   produced a bead missing the structural convoy linkage despite the
   plan being correct.

b. **Resolvable dependencies.** For each `depends_on` edge, the
   target bead must exist. If pre-existing, it must be open (or be
   a convoy bead). A closed-and-irrelevant target → fail.

i. **No improper mutations.** The cartographer must not have closed
   or modified any prior-epoch or existing open work bead, AND must
   not have mutated any existing convoy bead (including a cohort
   convoy joined this run). EXCEPTIONS:
   - Dependency-list ADDITIONS pointing at beads emitted in THIS run
     are allowed (category-d / `existing_to_new` edges).
   - HOLDING stubs (label `placeholder:cross-wo-blocker`) whose
     `placeholder-blocker:` matches this run's `${WORK_ORDER_ID}`
     MAY have status transitioned from `open` to `closed`, but ONLY
     if their id appears in `emitted.json:holding_stubs_released`.
     Any other field (body, title, labels, convoy) must remain
     unchanged. A HOLDING close not recorded in
     `holding_stubs_released` → fail.

   For prior-epoch task beads — compare against fresh query:

   ```bash
   gc --rig "$RIG" bd list --all \\
     --label="source:work-order:${WORK_ORDER_ID}" --json \\
     | jq '[.[] | select(.labels | index("epoch:'"${EPOCH}"'") | not)]' \\
     > "$RUN_DIR/prior_epoch_now.json"
   ```

   For each prior-epoch bead in the original inventory, status,
   labels, and convoy membership in the fresh query must match.
   Any divergence (status changed, label added/removed, convoy
   changed, body changed, title changed) → fail.

   **Dependency-list envelope.** The bead's `depends_on` list MAY
   contain new entries pointing at beads emitted by THIS run
   (validate by cross-referencing each entry against
   `emitted.json:beads_emitted`). It MUST NOT have lost any
   dependency that was present in the prior inventory. It MUST NOT
   contain new entries pointing at beads that are NOT in this run's
   emission set. Any of those three conditions → fail.

   The same envelope applies to every existing open bead listed in
   `beads_inventory.json:candidate_dependents` regardless of whether
   it was a prior-epoch bead — body/title/labels/status/convoy must
   be unchanged; only depends_on additions to this run's new beads
   are permitted. HOLDING stubs are explicitly excluded from
   `candidate_dependents` (see the script), so this envelope does
   not apply to them; the HOLDING-close exception lives in the
   prior_holding_stubs envelope below.

   **HOLDING envelope.** For each entry in
   `beads_inventory.json:prior_holding_stubs`, the bead may be in
   one of two states post-emit:
   - `status=open` and unchanged: cartographer chose `partial`
     classification or skipped the release. Must appear in
     `emitted.json:holding_stubs_partial`.
   - `status=closed`: cartographer closed it. Must appear in
     `emitted.json:holding_stubs_released`. Body, title, labels,
     and convoy must be unchanged.
   Any other divergence (status flipped without the matching record,
   labels added, body edited) → fail.

   For a joined cohort convoy — compare against the original record:

   ```bash
   JOINED_ID=$(jq -r '.convoys_joined[0].id // empty' "$RUN_DIR/emitted.json")
   if [ -n "$JOINED_ID" ]; then
     gc --rig "$RIG" bd show "$JOINED_ID" --json \\
       > "$RUN_DIR/joined_convoy_now.json"
   fi
   ```

   The joined convoy bead's title, labels, and own status must be
   unchanged from `beads_inventory.json:cohort_convoy.json`. Its
   member list will have grown (new beads point at it via
   `--convoy=<id>` at creation) — that growth is expected and is
   not a mutation of the convoy bead itself. Any other divergence
   → fail.

j. **Cohort coherence.** If `inventory.json:cohort_label` is set,
   exactly one cohort convoy must now carry that label. Verify:

   ```bash
   COHORT_LABEL=$(jq -r '.cohort_label // empty' "$RUN_DIR/inventory.json")
   if [ -n "$COHORT_LABEL" ]; then
     COUNT=$(gc --rig "$RIG" bd list --all --type=convoy \\
               --label="$COHORT_LABEL" --json | jq 'length')
     # COUNT must be exactly 1.
   fi
   ```

   Count of 0 → fail (cohort convoy missing; planning broken).
   Count of 1 → pass.
   Count > 1 → fail (duplicate cohort convoys; should have been
   caught by step 4's `unresolved_cohort_dup` and joined to the
   earliest one).

   Additionally, every new task bead created this run must carry
   the cohort convoy's id as its `--convoy` parent. If any new
   bead is in a non-cohort convoy or no convoy → fail.

k. **Mayor notification sent.** Confirm that the mayor mail from
   emit was sent successfully, regardless of whether the mayor has
   already read or archived it:

   ```bash
   SUBJECT_PREFIX="CARTOGRAPHER: ${WORK_ORDER_ID} epoch ${EPOCH}"
   (
     cd "$CITY_ROOT"
     gc bd list --all --include-infra \\
       --type=message --assignee=gastown.mayor \\
       --title "$SUBJECT_PREFIX" --limit 0 --json
   ) > "$RUN_DIR/mayor_notification_query.json"
   MAIL_COUNT=$(
     jq --arg subject_prefix "$SUBJECT_PREFIX" \\
        '[.[]? | select((.title // "") | startswith($subject_prefix))] | length' \\
        "$RUN_DIR/mayor_notification_query.json"
   )
   [ "$MAIL_COUNT" -ge 1 ] || echo "FAIL: mayor notification mail not found for ${WORK_ORDER_ID} epoch ${EPOCH}"
   ```

   Result must be ≥ 1. This deliberately queries message beads, not
   `gc mail inbox`, because `inbox` lists only unread mail. If 0 →
   fail (the mayor never learned about the new beads or the obsolete
   review list). Run the query from `$CITY_ROOT`; the cartographer's
   per-run worktree is inside the city but belongs to the rig source
   tree, and `bd list` must use the city context for city mail beads.

m. **HOLDING created-bead invariants.** Every HOLDING stub in
   `emitted.json:holding_stubs_created` must carry the origin labels,
   carry the placeholder labels, have empty/absent `gc.routed_to`
   metadata, and be the dependency target for each emitted dependent
   listed in `dependent_bead_ids`.

   ```bash
   for HOLDING in $(jq -r '.holding_stubs_created[].id' "$RUN_DIR/emitted.json"); do
     RECORD=$(jq -c --arg id "$HOLDING" '.[] | select(.id == $id)' "$RUN_DIR/validation_query.json")
     if [ -z "$RECORD" ]; then
       echo "FAIL: HOLDING $HOLDING missing from validation_query.json"
       # → fail
       continue
     fi

     ROUTED=$(printf '%s\n' "$RECORD" | jq -r '.metadata["gc.routed_to"] // empty' 2>/dev/null)
     if [ -n "$ROUTED" ]; then
       echo "FAIL: HOLDING $HOLDING has routed_to=$ROUTED (must be empty)"
       # → fail
     fi

     for LABEL in "source:work-order:${WORK_ORDER_ID}" "epoch:${EPOCH}" \\
                  "placeholder:cross-wo-blocker" "placeholder-for-wo:${WORK_ORDER_ID}"; do
       if ! printf '%s\n' "$RECORD" | jq -e --arg label "$LABEL" '(.labels // []) | index($label)' >/dev/null; then
         echo "FAIL: HOLDING $HOLDING missing label $LABEL"
         # → fail
       fi
     done

     BLOCKER_LABEL=$(printf '%s\n' "$RECORD" | jq -r '.labels[]? | select(startswith("placeholder-blocker:"))' | head -n 1)
     [ -n "$BLOCKER_LABEL" ] || echo "FAIL: HOLDING $HOLDING missing placeholder-blocker label"

     jq -r --arg holding "$HOLDING" '.holding_stubs_created[] | select(.id==$holding) | .dependent_bead_ids[]?' "$RUN_DIR/emitted.json" |
     while IFS= read -r DEPENDENT; do
       [ -z "$DEPENDENT" ] && continue
       if ! jq -e --arg id "$DEPENDENT" --arg holding "$HOLDING" '
             .[] | select(.id == $id)
             | ([.dependencies[]?.depends_on_id, .depends_on[]?] | map(select(. == $holding)) | length) > 0
           ' "$RUN_DIR/validation_query.json" >/dev/null; then
         echo "FAIL: dependent $DEPENDENT is missing depends_on edge to HOLDING $HOLDING"
         # → fail
       fi
     done
   done
   ```

   Any HOLDING with routing metadata, missing origin/placeholder
   labels, or missing dependent edge → fail. This is the categorical
   defense against the bd-persistence bug accidentally leaking
   scale_check visibility onto a permanent placeholder, and it proves
   held downstream work is actually wedged on the placeholder until the
   blocker work order lands.

n. **Routing coverage and downstream progression.** Every bead in
   `emitted.json:beads_emitted` must either still have
   `gc.routed_to` set to `emitted.json:routing_target`, or have
   already progressed into a valid downstream lifecycle state
   (claimed by polecat, handed to refinery, or closed). Do not require
   `gc.routed_to` to remain pointed at polecat after automation has
   claimed the bead; polecat is expected to reroute completed branch
   work to refinery.

   ```bash
   CARTOGRAPHER_ROUTING_MODE=lifecycle \\
   CARTOGRAPHER_ROUTING_QUERY="$RUN_DIR/validation_query.json" \\
   CARTOGRAPHER_ROUTING_OUTPUT="$RUN_DIR/validation_store_routing.json" \\
     .gc/scripts/cartographer-validate-emitted-routing.sh || \\
       jq -r '.failures[]? | "FAIL: " + .bead_id + " " + .detail' \\
         "$RUN_DIR/validation_store_routing.json"
   ```

   A missing initial route with no downstream handoff evidence means
   the rig will starve the affected beads — the controller's
   scale_check cannot see them. A route that has legitimately moved
   from polecat to refinery is success, not validation drift.

**4. On success,** write `$RUN_DIR/validation_store.json`:

```json
{
  "status": "ok",
  "summary": "Store checks passed: dependencies resolvable, no improper mutations, cohort coherent, mayor notified, HOLDING routing clean, sling coverage complete.",
  "warnings": ["..."]
}
```

The mayor mail was already sent in step `emit`. Exit the formula
cleanly.

```bash
gc --rig "$RIG" bd close "$GC_BEAD_ID" --continue
gc runtime drain-ack
```

**5. On failure,** write `$RUN_DIR/validation_store.json` with
`status: "failed"`, the failed check id(s), and the offending bead
ids. Mail the mayor with subject prefix `[HUMAN REVIEW NEEDED]`
(see "Human-review notifications" in the formula description) and
the failure detail. Do NOT roll back or close anything — block this
validation step for human review and leave the partial graph for
human inspection.

```bash
.gc/scripts/cartographer-human-review-block.sh "validate-store failed"
gc runtime drain-ack
exit 0
```

This explicit close and drain acknowledgement are REQUIRED. gascity's formula engine does not
auto-close step beads when a fresh-wake session exits; omitting the close
leaves the step bead open and deadlocks downstream steps that `needs`
this one. The `--continue` flag advances the molecule to the next
eligible step. The `gc runtime drain-ack` call lets the controller archive
this fresh session so the singleton Cartographer pool can spawn a new
session for the next ready step.

If you took a failure-mode branch above and exited early (wrote
`failure.json` or `needs_human.json` and stopped), do NOT close and do
NOT leave the step assigned to cartographer. Run the human-review step
disposition helper from the formula description so automation stops
dispatching this failed step until an operator explicitly resumes it.

"""
