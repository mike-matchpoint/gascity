scope = "city"
provider = "codex"
lifecycle = "one_shot"
wake_mode = "fresh"
work_dir = ".gc/agents/execution-city-operations/codegen-return-reviewers/{{.AgentBase}}"
nudge = "Claim one codegen return review item, decide whether execution can resume, and exit."
idle_timeout = "1h"
min_active_sessions = 0
max_active_sessions = 3

[work_selector]
status = "open"
unassigned = true
ready = true
sort = "created_asc"

[work_selector.metadata]
"gc.routed_to" = "{{.Agent}}"

[scale_check_query]
status = "open"
unassigned = true
ready = true
sort = "created_asc"

[scale_check_query.metadata]
"gc.routed_to" = "{{.Agent}}"

[option_defaults]
effort = "high"
