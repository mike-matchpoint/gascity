scope = "rig"
lifecycle = "one_shot"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/polecats/{{.AgentBase}}"
nudge = "Run gc hook; it checks assigned work first, then routed pool work."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}} --sync"]
idle_timeout = "2h"
min_active_sessions = 0
max_active_sessions = 5

# Pin the model. The polecat is the generator-analogue seat (the
# loop-harness implementer counterpart); owner order 2026-07-15 lands
# it on Fable. Other roles inherit the provider default.
[option_defaults]
model = "fable"
